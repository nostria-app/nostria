<!-- Panel Header -->
<div class="panel-header">
  <a mat-icon-button routerLink="/communities" matTooltip="Back to Communities">
    <mat-icon>arrow_back</mat-icon>
  </a>
  <h2 class="panel-title title-font">Create Community</h2>
</div>

<div class="create-community-container">
  <mat-card class="form-card">
    <mat-card-content>
      <div class="form-fields">
        <mat-form-field appearance="outline">
          <mat-label>Community Name</mat-label>
          <input matInput
                 [value]="name()"
                 (input)="name.set($any($event.target).value)"
                 placeholder="e.g., Nostr Developers"
                 required />
          <mat-hint>Choose a descriptive name for your community</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Description</mat-label>
          <textarea matInput
                    [value]="description()"
                    (input)="description.set($any($event.target).value)"
                    placeholder="What is this community about?"
                    rows="3"></textarea>
          <mat-hint>Optional description shown to visitors</mat-hint>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Banner Image URL</mat-label>
          <input matInput
                 [value]="image()"
                 (input)="image.set($any($event.target).value)"
                 placeholder="https://example.com/banner.jpg" />
          <mat-hint>Optional banner image for the community</mat-hint>
        </mat-form-field>

        @if (image()) {
        <div class="image-preview">
          <img [src]="image()" alt="Preview" loading="lazy" />
        </div>
        }

        <mat-form-field appearance="outline">
          <mat-label>Rules</mat-label>
          <textarea matInput
                    [value]="rules()"
                    (input)="rules.set($any($event.target).value)"
                    placeholder="Community rules and guidelines"
                    rows="3"></textarea>
          <mat-hint>Optional rules for community members</mat-hint>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <a mat-button routerLink="/communities">Cancel</a>
        <button mat-flat-button
                [disabled]="!name().trim() || isPublishing()"
                (click)="createCommunity()">
          @if (isPublishing()) {
          <mat-spinner diameter="18"></mat-spinner>
          } @else {
          <mat-icon>add</mat-icon>
          }
          Create Community
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
