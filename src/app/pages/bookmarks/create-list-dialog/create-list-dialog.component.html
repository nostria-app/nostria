<div dialog-content class="create-bookmark-folder-content">
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Folder Name</mat-label>
    <input matInput [ngModel]="listName()" (ngModelChange)="listName.set($event); generateIdFromName()"
      placeholder="My Reading Folder" required>
  </mat-form-field>

  @if (!isRename()) {
  <mat-form-field appearance="outline" class="full-width">
    <mat-label>Unique ID (d-tag)</mat-label>
    <input matInput [ngModel]="listId()" (ngModelChange)="listId.set($event)" placeholder="my-reading-list" required>
    <mat-hint>Used to uniquely identify this list. Can contain letters, numbers, and hyphens.</mat-hint>
  </mat-form-field>

  <div class="private-checkbox">
    <mat-checkbox [ngModel]="isPrivate()" (ngModelChange)="isPrivate.set($event)">
      <span class="checkbox-label">Private (Encrypted)</span>
    </mat-checkbox>
    <div class="checkbox-hint">
      Private folders encrypt bookmark contents using NIP-44 so only you can see them
    </div>
  </div>
  }
</div>

<div dialog-actions class="create-bookmark-folder-actions">
  <button mat-button (click)="cancel()">Cancel</button>
  <button mat-flat-button (click)="create()" [disabled]="!listName().trim() || (!isRename() && !listId().trim())">
    {{ isRename() ? 'Rename' : 'Create Folder' }}
  </button>
</div>
