<app-custom-dialog
  [title]="title"
  [showCloseButton]="true"
  [disableClose]="false"
  [width]="'520px'"
  [maxWidth]="'92vw'"
  [panelClass]="'delete-confirmation-dialog'"
  (closed)="cancel()">

  <div dialog-content class="delete-confirmation-content">
    <p>Delete requests are not guaranteed on a decentralized network, but they work in most cases.</p>

    @if (supportsAddressDelete) {
      <div class="delete-mode-copy">
        <p>Choose what to remove:</p>

        <mat-radio-group [(ngModel)]="selectedMode" aria-label="Delete mode" class="delete-mode-group">
          <mat-radio-button value="e">
            Delete this version (recommended)
          </mat-radio-button>
          <mat-radio-button value="a">
            Delete all versions
          </mat-radio-button>
        </mat-radio-group>
      </div>
    }
  </div>

  <div dialog-actions>
    <button mat-button type="button" (click)="cancel()">Cancel</button>
    <button mat-flat-button class="delete-button" type="button" (click)="confirm()">{{ confirmText }}</button>
  </div>
</app-custom-dialog>
