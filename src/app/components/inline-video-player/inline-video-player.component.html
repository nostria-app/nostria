<div class="inline-video-container" [class.fill-container]="fillContainer()" (click)="$event.stopPropagation()">
  <video #videoElement class="video-element" [src]="effectiveSrc()" [poster]="effectivePoster()"
    [muted]="shouldBeMuted()" [loop]="loop()" playsinline [attr.preload]="effectivePreload()"
    (loadedmetadata)="onVideoElementReady($event)" [class.blurred]="blurred()" [class.fill-container]="fillContainer()"
    [class.portrait-fit]="isPortraitVideo() && !fillContainer()"
    [class.needs-rotation-correction]="needsRotationCorrection()"
    [class.rotation-correction-fill]="needsRotationCorrection() && fillContainer()"
    [style.object-fit]="effectiveObjectFit()" (pointerdown)="onVideoPointerDown($event)"
    (pointermove)="onVideoPointerMove($event)" (pointerup)="onVideoPointerUp($event)"
    (pointercancel)="onVideoPointerCancel()" (click)="onVideoClick($event)"
    (dblclick)="onVideoDoubleClick($event)"></video>

  <!-- Error overlay - shown when video fails to load -->
  @if (hasError()) {
  <div class="error-overlay">
    <mat-icon>error_outline</mat-icon>
    <span>Video failed to load</span>
    <div class="error-actions">
      <button mat-stroked-button type="button" class="retry-button" (click)="retryVideoLoad($event)">
        <mat-icon>refresh</mat-icon>
        <span>Retry</span>
      </button>
      <a [href]="src()" target="_blank" rel="noopener noreferrer" class="open-link">
        Open in new tab
      </a>
    </div>
  </div>
  }

  <!-- Video Controls - unified UI component -->
  @if (!hasError()) {
  <app-video-controls [videoElement]="videoElementSignal()" [config]="effectiveControlsConfig()"
    (playPause)="togglePlay()" (seek)="onSeek($event)" (volumeChange)="onVolumeChange($event)"
    (muteToggle)="onMuteToggle()" (playbackRateChange)="onPlaybackRateChange($event)"
    (fullscreenToggle)="toggleFullscreen()" (pipToggle)="pictureInPicture()" (castToggle)="castToDevice()" />
  }
</div>
