<h2 mat-dialog-title>{{ data.title }}</h2>
<mat-dialog-content>
  <p>{{ data.message }}</p>
  @if (data.warningText) {
    <p class="warning-text">{{ data.warningText }}</p>
  }
  @if (data.items?.length) {
    <div class="item-list">
      <p class="item-list-title">Accounts on this device:</p>
      <ul>
        @for (item of data.items; track item) {
          <li>{{ item }}</li>
        }
      </ul>
    </div>
  }
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">
    {{ data.cancelText || 'Cancel' }}
  </button>
  <button mat-flat-button [class]="data.confirmColor" (click)="confirm()">
    {{ data.confirmText || 'Confirm' }}
  </button>
</mat-dialog-actions>
