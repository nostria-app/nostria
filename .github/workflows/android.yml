name: Tauri Android Build

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_signed_release:
        description: Build a signed release artifact when Android signing secrets are configured
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android-verification:
    name: Android verification artifacts
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build debug APK
        run: npm run tauri:android:build:packaged

      - name: Build release APK with debug signing for verification
        env:
          TAURI_ANDROID_RELEASE_USE_DEBUG_KEY: 'true'
        run: npx tauri android build --apk --release

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-debug-apk-${{ github.ref_name }}-${{ github.run_number }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/debug/*.apk
          if-no-files-found: error

      - name: Upload release verification APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-verification-apk-${{ github.ref_name }}-${{ github.run_number }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
          if-no-files-found: error

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-mapping-${{ github.ref_name }}-${{ github.run_number }}
          path: src-tauri/gen/android/app/build/outputs/mapping/**
          if-no-files-found: error

  build-android-signed-release:
    name: Android signed release artifacts
    runs-on: ubuntu-22.04
    needs: build-android-verification
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.build_signed_release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate Android signing secrets
        shell: bash
        env:
          TAURI_ANDROID_KEYSTORE_BASE64: ${{ secrets.TAURI_ANDROID_KEYSTORE_BASE64 }}
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.TAURI_ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.TAURI_ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.TAURI_ANDROID_KEY_PASSWORD }}
        run: |
          missing=0

          for key in TAURI_ANDROID_KEYSTORE_BASE64 TAURI_ANDROID_KEYSTORE_PASSWORD TAURI_ANDROID_KEY_ALIAS TAURI_ANDROID_KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.TAURI_ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/nostria-android.keystore"

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build signed release APK
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.TAURI_ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.TAURI_ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.TAURI_ANDROID_KEY_PASSWORD }}
        run: npx tauri android build --apk --release

      - name: Build signed release AAB
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.TAURI_ANDROID_KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.TAURI_ANDROID_KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.TAURI_ANDROID_KEY_PASSWORD }}
        run: npx tauri android build --aab --release

      - name: Upload signed release APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-apk-${{ github.ref_name }}-${{ github.run_number }}
          path: src-tauri/gen/android/app/build/outputs/apk/**/release/*.apk
          if-no-files-found: error

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-aab-${{ github.ref_name }}-${{ github.run_number }}
          path: src-tauri/gen/android/app/build/outputs/bundle/**/*.aab
          if-no-files-found: error

      - name: Upload signed release mapping
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-mapping-signed-${{ github.ref_name }}-${{ github.run_number }}
          path: src-tauri/gen/android/app/build/outputs/mapping/**
          if-no-files-found: error
