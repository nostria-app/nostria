name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Publish as a prerelease'
        type: boolean
        default: false

permissions:
  contents: write
  packages: read

jobs:
  publish-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            platform: ubuntu-22.04
            args: --bundles appimage,deb
          - name: windows
            platform: windows-latest
            args: --bundles nsis,msi
          - name: macos
            platform: macos-latest
            args: --target universal-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Determine release metadata
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "package.json version '$VERSION' is not a supported semver value" >&2
            exit 1
          fi

          if [[ "$VERSION" == *-* ]]; then
            VERSION_PRERELEASE=true
          else
            VERSION_PRERELEASE=false
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            if [ "${GITHUB_REF_NAME}" != "v${VERSION}" ]; then
              echo "Tag ${GITHUB_REF_NAME} does not match package.json version v${VERSION}" >&2
              exit 1
            fi
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "RELEASE_DRAFT=false" >> "$GITHUB_ENV"
            echo "RELEASE_PRERELEASE=${VERSION_PRERELEASE}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=v${VERSION}" >> "$GITHUB_ENV"
            echo "RELEASE_DRAFT=true" >> "$GITHUB_ENV"
            if [ "${{ github.event.inputs.prerelease }}" = "true" ] || [ "$VERSION_PRERELEASE" = "true" ]; then
              echo "RELEASE_PRERELEASE=true" >> "$GITHUB_ENV"
            else
              echo "RELEASE_PRERELEASE=false" >> "$GITHUB_ENV"
            fi
          fi

      - name: Install Rust toolchain
        if: matrix.name != 'macos'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain for universal macOS build
        if: matrix.name == 'macos'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libappindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build installers and publish release assets
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: Nostria v${{ env.VERSION }}
          releaseBody: |
            Installers for Windows, Linux, and macOS built from the bundled Nostria desktop app.
          releaseDraft: ${{ env.RELEASE_DRAFT }}
          prerelease: ${{ env.RELEASE_PRERELEASE }}
          args: ${{ matrix.args }}
