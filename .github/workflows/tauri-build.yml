name: Tauri Platform Builds

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_android_signed_release:
        description: Build a signed Android release artifact when signing secrets are configured
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop:
    name: Desktop ${{ matrix.name }} artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            platform: ubuntu-22.04
            rust_targets: ''
            npm_script: npm run tauri:build:linux
            artifact_path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
          - name: windows
            platform: windows-latest
            rust_targets: ''
            npm_script: npm run tauri:build:windows
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: windows-arm
            platform: windows-latest
            rust_targets: aarch64-pc-windows-msvc
            npm_script: npm run tauri:build:windows-arm
            artifact_path: |
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          - name: macos
            platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            npm_script: npm run tauri:build:macos
            artifact_path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain with extra targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libappindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install LLVM for Windows ARM builds
        if: matrix.name == 'windows-arm'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          'C:\Program Files\LLVM\bin' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure compiler for Windows ARM builds
        if: matrix.name == 'windows-arm'
        shell: pwsh
        run: |
          'CC_aarch64_pc_windows_msvc=clang-cl' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          'CXX_aarch64_pc_windows_msvc=clang-cl' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build desktop installers
        run: ${{ matrix.npm_script }}

      - name: Upload installers
        uses: actions/upload-artifact@v6
        with:
          name: nostria-${{ matrix.name }}-installers-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  build-android-verification:
    name: Android verification artifacts
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build debug APK
        run: npx tauri android build --debug --apk --target aarch64

      - name: Prepare Android project for release artifact build
        env:
          TAURI_ANDROID_RELEASE_USE_DEBUG_KEY: 'true'
        run: npx tauri android build --apk --target aarch64

      - name: Build arm64 release APK with debug signing for verification
        env:
          TAURI_ANDROID_RELEASE_USE_DEBUG_KEY: 'true'
        working-directory: src-tauri/gen/android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleArm64Release -x rustBuildArm64Release

      - name: List generated Android artifacts
        shell: bash
        run: |
          echo "APK outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/apk ]; then
            find src-tauri/gen/android/app/build/outputs/apk -maxdepth 3 -type f | sort
          else
            echo "No APK output directory found"
          fi
          echo "Bundle outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/bundle ]; then
            find src-tauri/gen/android/app/build/outputs/bundle -maxdepth 3 -type f | sort
          else
            echo "No bundle output directory found"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-debug-apk-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          if-no-files-found: error

      - name: Upload release verification APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-verification-apk-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/apk/arm64/release/*.apk
          if-no-files-found: error

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-mapping-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/mapping/**
          if-no-files-found: error

  build-android-signed-release:
    name: Android signed release artifacts
    runs-on: ubuntu-22.04
    needs: build-android-verification
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.build_android_signed_release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate Android signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=0

          for key in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/nostria-android.keystore"

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Prepare Android project for signed release artifact build
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: npx tauri android build --apk --target aarch64

      - name: Build signed arm64 release APK
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: src-tauri/gen/android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleArm64Release -x rustBuildArm64Release

      - name: Build signed arm64 release AAB
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: src-tauri/gen/android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:bundleArm64Release -x rustBuildArm64Release

      - name: List generated Android artifacts
        shell: bash
        run: |
          echo "APK outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/apk ]; then
            find src-tauri/gen/android/app/build/outputs/apk -maxdepth 3 -type f | sort
          else
            echo "No APK output directory found"
          fi
          echo "Bundle outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/bundle ]; then
            find src-tauri/gen/android/app/build/outputs/bundle -maxdepth 3 -type f | sort
          else
            echo "No bundle output directory found"
          fi

      - name: Upload signed release APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-apk-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/apk/arm64/release/*.apk
          if-no-files-found: error

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-aab-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/bundle/arm64Release/*.aab
          if-no-files-found: error

      - name: Upload signed release mapping
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-mapping-signed-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/mapping/**
          if-no-files-found: error

  build-ios-verification:
    name: iOS verification artifacts
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Install CocoaPods dependencies
        working-directory: src-tauri/gen/apple
        shell: bash
        run: pod install

      - name: Build unsigned iOS app bundle
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace src-tauri/gen/apple/nostria.xcworkspace \
            -scheme nostria_iOS \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$RUNNER_TEMP/nostria-ios-derived-data" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package iOS build outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios

          APP_PATH="$RUNNER_TEMP/nostria-ios-derived-data/Build/Products/Release-iphoneos/Nostria.app"
          DSYM_PATH="$RUNNER_TEMP/nostria-ios-derived-data/Build/Products/Release-iphoneos/Nostria.app.dSYM"

          if [ ! -d "$APP_PATH" ]; then
            echo "Expected iOS app bundle not found at $APP_PATH" >&2
            find "$RUNNER_TEMP/nostria-ios-derived-data/Build/Products" -maxdepth 3 -type d | sort || true
            exit 1
          fi

          ditto -c -k --keepParent "$APP_PATH" artifacts/ios/nostria-ios-app-run-${{ github.run_id }}-${{ github.run_attempt }}.zip

          if [ -d "$DSYM_PATH" ]; then
            ditto -c -k --keepParent "$DSYM_PATH" artifacts/ios/nostria-ios-dsym-run-${{ github.run_id }}-${{ github.run_attempt }}.zip
          fi

      - name: Upload iOS verification artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nostria-ios-verification-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ios/**
          if-no-files-found: error