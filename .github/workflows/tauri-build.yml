name: Tauri Platform Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_android_signed_release:
        description: Build a signed Android release artifact when signing secrets are configured
        type: boolean
        default: false
      build_ios_signed_release:
        description: Build a signed iOS release artifact when signing secrets are configured
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-desktop:
    name: Desktop ${{ matrix.name }} artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            platform: ubuntu-22.04
            rust_targets: ""
            npm_script: npm run tauri:build:linux
            artifact_path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
          - name: windows
            platform: windows-latest
            rust_targets: ""
            npm_script: npm run tauri:build:windows
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: windows-arm
            platform: windows-latest
            rust_targets: aarch64-pc-windows-msvc
            npm_script: npm run tauri:build:windows-arm
            artifact_path: |
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
          - name: macos
            platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            npm_script: npm run tauri:build:macos
            artifact_path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain with extra targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libappindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install LLVM for Windows ARM builds
        if: matrix.name == 'windows-arm'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          'C:\Program Files\LLVM\bin' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure compiler for Windows ARM builds
        if: matrix.name == 'windows-arm'
        shell: pwsh
        run: |
          'CC_aarch64_pc_windows_msvc=clang-cl' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          'CXX_aarch64_pc_windows_msvc=clang-cl' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build desktop installers
        run: ${{ matrix.npm_script }}

      - name: Upload installers
        uses: actions/upload-artifact@v6
        with:
          name: nostria-${{ matrix.name }}-installers-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  build-android-verification:
    name: Android verification artifacts
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build debug APK
        run: npx tauri android build --debug --apk --target aarch64

      - name: Prepare Android project for release artifact build
        env:
          TAURI_ANDROID_RELEASE_USE_DEBUG_KEY: "true"
        run: npx tauri android build --apk --target aarch64

      - name: Build arm64 release APK with debug signing for verification
        env:
          TAURI_ANDROID_RELEASE_USE_DEBUG_KEY: "true"
        working-directory: src-tauri/gen/android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleArm64Release -x rustBuildArm64Release

      - name: List generated Android artifacts
        shell: bash
        run: |
          echo "APK outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/apk ]; then
            find src-tauri/gen/android/app/build/outputs/apk -maxdepth 3 -type f | sort
          else
            echo "No APK output directory found"
          fi
          echo "Bundle outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/bundle ]; then
            find src-tauri/gen/android/app/build/outputs/bundle -maxdepth 3 -type f | sort
          else
            echo "No bundle output directory found"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-debug-apk-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          if-no-files-found: error

      - name: Upload release verification APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-verification-apk-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/apk/arm64/release/*.apk
          if-no-files-found: error

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-mapping-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/mapping/**
          if-no-files-found: error

  build-android-signed-release:
    name: Android signed release artifacts
    runs-on: ubuntu-22.04
    needs: build-android-verification
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.build_android_signed_release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate Android signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=0

          for key in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/nostria-android.keystore"

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Prepare Android project for signed release artifact build
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: npx tauri android build --apk --target aarch64

      - name: Build signed arm64 release APK
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: src-tauri/gen/android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleArm64Release -x rustBuildArm64Release

      - name: Build signed arm64 release AAB
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: src-tauri/gen/android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:bundleArm64Release -x rustBuildArm64Release

      - name: List generated Android artifacts
        shell: bash
        run: |
          echo "APK outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/apk ]; then
            find src-tauri/gen/android/app/build/outputs/apk -maxdepth 3 -type f | sort
          else
            echo "No APK output directory found"
          fi
          echo "Bundle outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/bundle ]; then
            find src-tauri/gen/android/app/build/outputs/bundle -maxdepth 3 -type f | sort
          else
            echo "No bundle output directory found"
          fi

      - name: Upload signed release APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-apk-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/apk/arm64/release/*.apk
          if-no-files-found: error

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-aab-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/bundle/arm64Release/*.aab
          if-no-files-found: error

      - name: Upload signed release mapping
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-mapping-signed-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/mapping/**
          if-no-files-found: error

  build-ios-verification:
    name: iOS verification artifacts
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Install CocoaPods dependencies
        working-directory: src-tauri/gen/apple
        shell: bash
        run: pod install

      - name: Build unsigned iOS app bundle
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace src-tauri/gen/apple/nostria.xcworkspace \
            -scheme nostria_iOS \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -derivedDataPath "$RUNNER_TEMP/nostria-ios-derived-data" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package iOS build outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios

          APP_PATH="$RUNNER_TEMP/nostria-ios-derived-data/Build/Products/Release-iphoneos/Nostria.app"
          DSYM_PATH="$RUNNER_TEMP/nostria-ios-derived-data/Build/Products/Release-iphoneos/Nostria.app.dSYM"

          if [ ! -d "$APP_PATH" ]; then
            echo "Expected iOS app bundle not found at $APP_PATH" >&2
            find "$RUNNER_TEMP/nostria-ios-derived-data/Build/Products" -maxdepth 3 -type d | sort || true
            exit 1
          fi

          ditto -c -k --keepParent "$APP_PATH" artifacts/ios/nostria-ios-app-run-${{ github.run_id }}-${{ github.run_attempt }}.zip

          if [ -d "$DSYM_PATH" ]; then
            ditto -c -k --keepParent "$DSYM_PATH" artifacts/ios/nostria-ios-dsym-run-${{ github.run_id }}-${{ github.run_attempt }}.zip
          fi

      - name: Upload iOS verification artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nostria-ios-verification-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ios/**
          if-no-files-found: error

  build-ios-signed-release:
    name: iOS signed release artifacts
    runs-on: macos-latest
    needs: build-ios-verification
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.build_ios_signed_release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate iOS signing secrets
        shell: bash
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          missing=0

          for key in IOS_CERTIFICATE IOS_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Install CocoaPods dependencies
        working-directory: src-tauri/gen/apple
        shell: bash
        run: pod install

      - name: Install iOS signing assets
        id: install-ios-signing
        shell: bash
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/ios-signing-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/ios.mobileprovision"
          PROFILE_PLIST_PATH="$RUNNER_TEMP/ios-profile.plist"
          KEYCHAIN_PATH="$RUNNER_TEMP/nostria-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24 | tr -d '\n')"
          PROFILE_INSTALL_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"

          echo "$IOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > "$PROFILE_PATH"

          mkdir -p "$PROFILE_INSTALL_DIR"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST_PATH")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST_PATH")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST_PATH")
          GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$PROFILE_PLIST_PATH" 2>/dev/null || echo false)
          HAS_PROVISIONED_DEVICES=$(/usr/libexec/PlistBuddy -c 'Print :ProvisionedDevices:0' "$PROFILE_PLIST_PATH" >/dev/null 2>&1 && echo true || echo false)
          HAS_ALL_DEVICES=$(/usr/libexec/PlistBuddy -c 'Print :ProvisionsAllDevices' "$PROFILE_PLIST_PATH" 2>/dev/null || echo false)

          if [ "$HAS_ALL_DEVICES" = 'true' ]; then
            EXPORT_METHOD='enterprise'
          elif [ "$HAS_PROVISIONED_DEVICES" = 'true' ] && [ "$GET_TASK_ALLOW" = 'true' ]; then
            EXPORT_METHOD='development'
          elif [ "$HAS_PROVISIONED_DEVICES" = 'true' ]; then
            EXPORT_METHOD='ad-hoc'
          else
            EXPORT_METHOD='app-store'
          fi

          cp "$PROFILE_PATH" "$PROFILE_INSTALL_DIR/$PROFILE_UUID.mobileprovision"

          SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\([^"]*\)"/\1/p' | head -n 1)

          if [ -z "$SIGNING_IDENTITY" ]; then
            echo 'No signing identity was imported into the temporary keychain.' >&2
            exit 1
          fi

          {
            echo "keychain_path=$KEYCHAIN_PATH"
            echo "keychain_password=$KEYCHAIN_PASSWORD"
            echo "profile_uuid=$PROFILE_UUID"
            echo "profile_name=$PROFILE_NAME"
            echo "team_id=$TEAM_ID"
            echo "export_method=$EXPORT_METHOD"
            echo "signing_identity=$SIGNING_IDENTITY"
          } >> "$GITHUB_OUTPUT"

      - name: Create iOS export options
        shell: bash
        env:
          TEAM_ID: ${{ steps.install-ios-signing.outputs.team_id }}
          PROFILE_NAME: ${{ steps.install-ios-signing.outputs.profile_name }}
          EXPORT_METHOD: ${{ steps.install-ios-signing.outputs.export_method }}
        run: |
          set -euo pipefail

          cat > "$RUNNER_TEMP/nostria-ios-export-options.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>no.brainbox.nostria</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive signed iOS app
        shell: bash
        env:
          KEYCHAIN_PATH: ${{ steps.install-ios-signing.outputs.keychain_path }}
          PROFILE_NAME: ${{ steps.install-ios-signing.outputs.profile_name }}
          TEAM_ID: ${{ steps.install-ios-signing.outputs.team_id }}
          SIGNING_IDENTITY: ${{ steps.install-ios-signing.outputs.signing_identity }}
        run: |
          set -euo pipefail

          xcodebuild \
            -workspace src-tauri/gen/apple/nostria.xcworkspace \
            -scheme nostria_iOS \
            -configuration Release \
            -sdk iphoneos \
            -destination generic/platform=iOS \
            -archivePath "$RUNNER_TEMP/Nostria.xcarchive" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH" \
            archive

      - name: Export signed iOS artifacts
        shell: bash
        run: |
          set -euo pipefail

          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/Nostria.xcarchive" \
            -exportPath "$RUNNER_TEMP/nostria-ios-export" \
            -exportOptionsPlist "$RUNNER_TEMP/nostria-ios-export-options.plist"

      - name: Package signed iOS outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios-signed

          IPA_PATH=$(find "$RUNNER_TEMP/nostria-ios-export" -maxdepth 1 -name '*.ipa' -print -quit)
          APP_PATH="$RUNNER_TEMP/Nostria.xcarchive/Products/Applications/Nostria.app"
          DSYM_PATH="$RUNNER_TEMP/Nostria.xcarchive/dSYMs/Nostria.app.dSYM"

          if [ -z "$IPA_PATH" ]; then
            echo 'No IPA was produced by xcodebuild -exportArchive.' >&2
            find "$RUNNER_TEMP/nostria-ios-export" -maxdepth 2 -print | sort || true
            exit 1
          fi

          cp "$IPA_PATH" artifacts/ios-signed/

          if [ -d "$APP_PATH" ]; then
            ditto -c -k --keepParent "$APP_PATH" artifacts/ios-signed/nostria-ios-app-signed-run-${{ github.run_id }}-${{ github.run_attempt }}.zip
          fi

          if [ -d "$DSYM_PATH" ]; then
            ditto -c -k --keepParent "$DSYM_PATH" artifacts/ios-signed/nostria-ios-dsym-signed-run-${{ github.run_id }}-${{ github.run_attempt }}.zip
          fi

          cp "$RUNNER_TEMP/nostria-ios-export-options.plist" artifacts/ios-signed/export-options-used.plist

      - name: Upload signed iOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nostria-ios-signed-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ios-signed/**
          if-no-files-found: error
