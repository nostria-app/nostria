name: Desktop Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            platform: ubuntu-22.04
            npm_script: npm run tauri:build:linux
            artifact_path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
          - name: windows
            platform: windows-latest
            npm_script: npm run tauri:build:windows
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/nsis/*.exe
          - name: macos
            platform: macos-latest
            npm_script: npm run tauri:build:macos
            artifact_path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install Rust toolchain
        if: matrix.name != 'macos'
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain for universal macOS build
        if: matrix.name == 'macos'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libappindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build desktop installers
        run: ${{ matrix.npm_script }}

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: nostria-${{ matrix.name }}-installers
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
