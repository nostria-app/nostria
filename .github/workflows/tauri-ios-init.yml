name: Tauri iOS Init

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tauri-ios-init:
    name: Initialize Tauri iOS project
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Initialize Tauri iOS project
        run: npm run tauri ios init

      - name: Package generated iOS output
        shell: bash
        run: |
          mkdir -p artifacts
          git status --short > artifacts/git-status.txt
          git diff --binary > artifacts/tauri-ios-init.patch

          if [ -d src-tauri/gen/apple ]; then
            ditto -c -k --keepParent src-tauri/gen/apple artifacts/src-tauri-gen-apple.zip
          fi

          if [ -d ios ]; then
            ditto -c -k --keepParent ios artifacts/ios-project.zip
          fi

      - name: Upload generated iOS output
        uses: actions/upload-artifact@v6
        with:
          name: nostria-tauri-ios-init-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/**
          if-no-files-found: error