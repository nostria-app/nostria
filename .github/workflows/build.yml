name: Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    name: Prepare draft release metadata
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.release-metadata.outputs.version }}
      release_tag: ${{ steps.release-metadata.outputs.release_tag }}
      release_name: ${{ steps.release-metadata.outputs.release_name }}
      release_prerelease: ${{ steps.release-metadata.outputs.release_prerelease }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Determine release metadata
        id: release-metadata
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "package.json version '$VERSION' is not a supported semver value" >&2
            exit 1
          fi

          RELEASE_TAG="v${VERSION}"
          RELEASE_NAME="Nostria v${VERSION}"

          RELEASE_PRERELEASE=false

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"
          echo "release_prerelease=$RELEASE_PRERELEASE" >> "$GITHUB_OUTPUT"

  build-desktop:
    name: Desktop ${{ matrix.name }} artifacts
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            platform: ubuntu-22.04
            rust_targets: ""
            tauri_args: --bundles appimage,deb --config src-tauri/tauri.release.conf.json
            artifact_path: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.sig
              src-tauri/target/release/bundle/deb/*.deb
          - name: windows
            platform: windows-latest
            rust_targets: ""
            tauri_args: --bundles nsis,msi --config src-tauri/tauri.release.conf.json
            artifact_path: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/msi/*.msi.sig
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.sig
          - name: windows-arm
            platform: windows-latest
            rust_targets: aarch64-pc-windows-msvc
            tauri_args: --target aarch64-pc-windows-msvc --bundles nsis,msi --config src-tauri/tauri.release.conf.json
            artifact_path: |
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/msi/*.msi.sig
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
              src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
          - name: macos
            platform: macos-latest
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            tauri_args: --target universal-apple-darwin --bundles app,dmg --config src-tauri/tauri.release.conf.json
            artifact_path: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust toolchain with extra targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.name == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libappindicator3-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            patchelf

      - name: Install LLVM for Windows ARM builds
        if: matrix.name == 'windows-arm'
        shell: pwsh
        run: |
          choco install llvm --no-progress -y
          'C:\Program Files\LLVM\bin' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure compiler for Windows ARM builds
        if: matrix.name == 'windows-arm'
        shell: pwsh
        run: |
          'CC_aarch64_pc_windows_msvc=clang-cl' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          'CXX_aarch64_pc_windows_msvc=clang-cl' | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Validate desktop updater signing secrets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo 'Missing required secret: TAURI_SIGNING_PRIVATE_KEY' >&2
            exit 1
          fi

      - name: Build desktop installers
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: npx tauri build --ci ${{ matrix.tauri_args }}

      - name: List desktop bundle outputs
        shell: bash
        run: |
          set -euo pipefail

          echo 'Bundle outputs:'
          if [ -d src-tauri/target ]; then
            find src-tauri/target -path '*/bundle/*' -type f | sort
          else
            echo 'No src-tauri/target directory found.' >&2
            exit 1
          fi

      - name: Validate desktop updater outputs
        shell: bash
        run: |
          set -euo pipefail

          required_patterns=()

          case '${{ matrix.name }}' in
            linux)
              required_patterns=(
                'src-tauri/target/release/bundle/appimage/*.AppImage'
                'src-tauri/target/release/bundle/appimage/*.AppImage.sig'
              )
              ;;
            windows)
              required_patterns=(
                'src-tauri/target/release/bundle/nsis/*.exe'
                'src-tauri/target/release/bundle/nsis/*.exe.sig'
              )
              ;;
            windows-arm)
              required_patterns=(
                'src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe'
                'src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe.sig'
              )
              ;;
            macos)
              required_patterns=(
                'src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz'
                'src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig'
              )
              ;;
          esac

          for pattern in "${required_patterns[@]}"; do
            if ! compgen -G "$pattern" > /dev/null; then
              echo "Missing expected updater artifact: $pattern" >&2
              exit 1
            fi
          done

      - name: Upload installers
        uses: actions/upload-artifact@v6
        with:
          name: nostria-${{ matrix.name }}-installers-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error

  build-android-verification:
    name: Android verification artifacts
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build debug APK
        run: npx tauri android build --debug --apk --target aarch64

      - name: Prepare Android project for release artifact build
        env:
          TAURI_ANDROID_RELEASE_USE_DEBUG_KEY: "true"
        run: npx tauri android build --apk --target aarch64

      - name: Build arm64 release APK with debug signing for verification
        env:
          TAURI_ANDROID_RELEASE_USE_DEBUG_KEY: "true"
        working-directory: src-tauri/gen/android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleArm64Release -x rustBuildArm64Release

      - name: List generated Android artifacts
        shell: bash
        run: |
          echo "APK outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/apk ]; then
            find src-tauri/gen/android/app/build/outputs/apk -maxdepth 3 -type f | sort
          else
            echo "No APK output directory found"
          fi
          echo "Bundle outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/bundle ]; then
            find src-tauri/gen/android/app/build/outputs/bundle -maxdepth 3 -type f | sort
          else
            echo "No bundle output directory found"
          fi

      - name: Upload debug APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-debug-apk-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/apk/universal/debug/*.apk
          if-no-files-found: error

      - name: Upload release verification APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-verification-apk-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/apk/arm64/release/*.apk
          if-no-files-found: error

      - name: Upload ProGuard mapping
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-mapping-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/mapping/**
          if-no-files-found: error

  build-android-signed-release:
    name: Android signed release artifacts
    runs-on: ubuntu-22.04
    needs: build-android-verification

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Android Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate Android signing secrets
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          missing=0

          for key in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/nostria-android.keystore"

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Prepare Android project for signed release artifact build
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: npx tauri android build --apk --target aarch64

      - name: Build signed arm64 release APK
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: src-tauri/gen/android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleArm64Release -x rustBuildArm64Release

      - name: Build signed arm64 release AAB
        env:
          TAURI_ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/nostria-android.keystore
          TAURI_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          TAURI_ANDROID_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          TAURI_ANDROID_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: src-tauri/gen/android
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew :app:bundleArm64Release -x rustBuildArm64Release

      - name: List generated Android artifacts
        shell: bash
        run: |
          echo "APK outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/apk ]; then
            find src-tauri/gen/android/app/build/outputs/apk -maxdepth 3 -type f | sort
          else
            echo "No APK output directory found"
          fi
          echo "Bundle outputs:"
          if [ -d src-tauri/gen/android/app/build/outputs/bundle ]; then
            find src-tauri/gen/android/app/build/outputs/bundle -maxdepth 3 -type f | sort
          else
            echo "No bundle output directory found"
          fi

      - name: Upload signed release APK
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-apk-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/apk/arm64/release/*.apk
          if-no-files-found: error

      - name: Upload signed release AAB
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-aab-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/bundle/arm64Release/*.aab
          if-no-files-found: error

      - name: Upload signed release mapping
        uses: actions/upload-artifact@v6
        with:
          name: nostria-android-release-mapping-signed-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: src-tauri/gen/android/app/build/outputs/mapping/**
          if-no-files-found: error

  build-ios-verification:
    name: iOS verification artifacts
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Build iOS simulator verification bundle
        shell: bash
        run: |
          set -euo pipefail
          if [ "$(uname -m)" = 'arm64' ]; then
            IOS_TARGET='aarch64-sim'
          else
            IOS_TARGET='x86_64'
          fi

          npx tauri ios build --ci --target "$IOS_TARGET"

      - name: Package iOS build outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios

          IOS_OUTPUT_ROOT='src-tauri/gen/apple/build'

          APP_PATH=$(
            find "$IOS_OUTPUT_ROOT" src-tauri/target "$HOME/Library/Developer/Xcode/DerivedData" \
              \( -path '*/Build/Products/*/*.app' -o -name '*.app' \) \
              -type d 2>/dev/null | head -n 1
          )
          DSYM_PATH=$(
            find "$IOS_OUTPUT_ROOT" src-tauri/target "$HOME/Library/Developer/Xcode/DerivedData" \
              -type d -name '*.app.dSYM' 2>/dev/null | head -n 1 || true
          )

          if [ -z "$APP_PATH" ]; then
            echo 'Expected iOS app bundle was not produced by tauri ios build.' >&2
            echo 'Contents of src-tauri/gen/apple/build:'
            find "$IOS_OUTPUT_ROOT" -maxdepth 6 \( -type d -o -type f \) | sort || true
            echo 'Contents of src-tauri/target:'
            find src-tauri/target -maxdepth 6 \( -type d -o -type f \) | sort || true
            echo 'Contents of Xcode DerivedData products:'
            find "$HOME/Library/Developer/Xcode/DerivedData" -path '*/Build/Products/*' \
              \( -type d -o -type f \) 2>/dev/null | sort || true
            exit 1
          fi

          ditto -c -k --keepParent "$APP_PATH" artifacts/ios/nostria-ios-app-run-${{ github.run_id }}-${{ github.run_attempt }}.zip

          if [ -n "$DSYM_PATH" ] && [ -d "$DSYM_PATH" ]; then
            ditto -c -k --keepParent "$DSYM_PATH" artifacts/ios/nostria-ios-dsym-run-${{ github.run_id }}-${{ github.run_attempt }}.zip
          fi

      - name: Upload iOS verification artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nostria-ios-verification-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ios/**
          if-no-files-found: error

  build-ios-signed-release:
    name: iOS signed release artifacts
    runs-on: macos-latest
    needs: build-ios-verification

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: Validate iOS signing secrets
        shell: bash
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          missing=0

          for key in IOS_CERTIFICATE IOS_CERTIFICATE_PASSWORD IOS_PROVISIONING_PROFILE; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key" >&2
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Print Tauri environment info
        run: npm run tauri:info

      - name: Derive iOS signing metadata
        id: ios-signing
        shell: bash
        env:
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          set -euo pipefail

          PROFILE_PATH="$RUNNER_TEMP/ios.mobileprovision"
          PROFILE_PLIST_PATH="$RUNNER_TEMP/ios-profile.plist"
          printf '%s' "$IOS_MOBILE_PROVISION" | tr -d '\r\n' | base64 --decode > "$PROFILE_PATH"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST_PATH"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST_PATH")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST_PATH")
          TEAM_ID=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "$PROFILE_PLIST_PATH")
          APP_IDENTIFIER=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "$PROFILE_PLIST_PATH")
          EXPECTED_BUNDLE_ID=$(node -p "require('./src-tauri/tauri.conf.json').identifier")
          PROFILE_BUNDLE_ID="${APP_IDENTIFIER#${TEAM_ID}.}"
          GET_TASK_ALLOW=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:get-task-allow' "$PROFILE_PLIST_PATH" 2>/dev/null || echo false)
          HAS_PROVISIONED_DEVICES=$(/usr/libexec/PlistBuddy -c 'Print :ProvisionedDevices:0' "$PROFILE_PLIST_PATH" >/dev/null 2>&1 && echo true || echo false)
          HAS_ALL_DEVICES=$(/usr/libexec/PlistBuddy -c 'Print :ProvisionsAllDevices' "$PROFILE_PLIST_PATH" 2>/dev/null || echo false)

          if [ "$PROFILE_BUNDLE_ID" != "$EXPECTED_BUNDLE_ID" ]; then
            echo "Provisioning profile bundle ID '$PROFILE_BUNDLE_ID' does not match app bundle ID '$EXPECTED_BUNDLE_ID'." >&2
            echo 'Create or download a provisioning profile for the exact app identifier configured in src-tauri/tauri.conf.json.' >&2
            exit 1
          fi

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          if [ "$HAS_ALL_DEVICES" = 'true' ]; then
            EXPORT_METHOD='release-testing'
          elif [ "$HAS_PROVISIONED_DEVICES" = 'true' ] && [ "$GET_TASK_ALLOW" = 'true' ]; then
            EXPORT_METHOD='debugging'
          elif [ "$HAS_PROVISIONED_DEVICES" = 'true' ]; then
            EXPORT_METHOD='release-testing'
          else
            EXPORT_METHOD='app-store-connect'
          fi

          {
            echo "profile_name=$PROFILE_NAME"
            echo "profile_uuid=$PROFILE_UUID"
            echo "team_id=$TEAM_ID"
            echo "export_method=$EXPORT_METHOD"
          } >> "$GITHUB_OUTPUT"

      - name: Import iOS signing certificate
        id: ios-certificate
        shell: bash
        env:
          IOS_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/ios-signing-cert.p12"
          KEYCHAIN_PATH="$HOME/Library/Keychains/ios-signing-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24 | tr -d '\r\n')"

          printf '%s' "$IOS_CERTIFICATE" | tr -d '\r\n' | base64 --decode > "$CERT_PATH"

          if ! openssl pkcs12 -in "$CERT_PATH" -passin pass:"$IOS_CERTIFICATE_PASSWORD" -nodes -nocerts 2>/dev/null | grep -q 'BEGIN .*PRIVATE KEY'; then
            echo 'The IOS_CERTIFICATE secret does not contain an exportable private key.' >&2
            echo 'Export the .p12 from Keychain Access using the Apple Distribution certificate entry that has the private key nested under it.' >&2
            exit 1
          fi

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/pkgbuild -T /usr/bin/productbuild -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CURRENT_KEYCHAINS=$(security list-keychain -d user | tr '\n' ' ')
          # shellcheck disable=SC2086
          security list-keychain -d user -s $CURRENT_KEYCHAINS "$KEYCHAIN_PATH"

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | sed -n 's/.*"\([^"]*\)"/\1/p' | grep -m 1 '^Apple Distribution:' || true)"

          if [ -z "$IDENTITY" ]; then
            echo 'Unable to resolve an Apple Distribution identity from the imported certificate.' >&2
            echo 'This usually means the .p12 contains a certificate without its private key, or the private key was not exportable when the .p12 was created.' >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi

          {
            echo "identity=$IDENTITY"
            echo "keychain_path=$KEYCHAIN_PATH"
          } >> "$GITHUB_OUTPUT"

      - name: Configure Xcode signing identity
        shell: bash
        env:
          IOS_SIGNING_IDENTITY: ${{ steps.ios-certificate.outputs.identity }}
          IOS_PROFILE_NAME: ${{ steps.ios-signing.outputs.profile_name }}
          IOS_PROFILE_UUID: ${{ steps.ios-signing.outputs.profile_uuid }}
          IOS_TEAM_ID: ${{ steps.ios-signing.outputs.team_id }}
        run: |
          set -euo pipefail

          PROJECT_FILE='src-tauri/gen/apple/nostria.xcodeproj/project.pbxproj'

          if [ ! -f "$PROJECT_FILE" ]; then
            echo "Missing Xcode project file: $PROJECT_FILE" >&2
            exit 1
          fi

          PROJECT_FILE="$PROJECT_FILE" SIGNING_IDENTITY="$IOS_SIGNING_IDENTITY" PROFILE_NAME="$IOS_PROFILE_NAME" PROFILE_UUID="$IOS_PROFILE_UUID" TEAM_ID="$IOS_TEAM_ID" python3 - <<'PY'
          from pathlib import Path
          import os

          project_file = Path(os.environ['PROJECT_FILE'])
          text = project_file.read_text(encoding='utf-8')
          identity = os.environ['SIGNING_IDENTITY']
          profile_name = os.environ['PROFILE_NAME']
          profile_uuid = os.environ['PROFILE_UUID']
          team_id = os.environ['TEAM_ID']

          def patch_block(block: str) -> str:
              block = block.replace(
                  'CODE_SIGN_IDENTITY = "iPhone Developer";',
                  f'CODE_SIGN_IDENTITY = "{identity}";'
              )

              additions = [
                  'CODE_SIGN_STYLE = Manual;',
                  f'DEVELOPMENT_TEAM = {team_id};',
                  f'"DEVELOPMENT_TEAM[sdk=iphoneos*]" = {team_id};',
                  f'PROVISIONING_PROFILE = "{profile_uuid}";',
                  f'"PROVISIONING_PROFILE[sdk=iphoneos*]" = "{profile_uuid}";',
                  f'PROVISIONING_PROFILE_SPECIFIER = "{profile_name}";',
                  f'"PROVISIONING_PROFILE_SPECIFIER[sdk=iphoneos*]" = "{profile_name}";',
              ]

              anchor = f'CODE_SIGN_IDENTITY = "{identity}";'
              if anchor not in block:
                  raise SystemExit(f'Missing anchor in block: {anchor}')

              for line in additions:
                  if line not in block:
                      block = block.replace(anchor, anchor + '\n\t\t\t\t' + line)
                      anchor = line

              return block

          parts = text.split('buildSettings = {')
          if len(parts) < 3:
              raise SystemExit('Unexpected pbxproj structure')

          rebuilt = [parts[0]]
          for part in parts[1:]:
              settings, remainder = part.split('};', 1)
              if 'CODE_SIGN_ENTITLEMENTS = nostria_iOS/nostria_iOS.entitlements;' in settings:
                  settings = patch_block(settings)
              rebuilt.append('buildSettings = {' + settings + '};' + remainder)

          project_file.write_text(''.join(rebuilt), encoding='utf-8')
          PY

          grep -n 'CODE_SIGN_IDENTITY\|CODE_SIGN_STYLE\|DEVELOPMENT_TEAM\|PROVISIONING_PROFILE' "$PROJECT_FILE"

      - name: Build signed iOS release bundle
        shell: bash
        env:
          IOS_MOBILE_PROVISION: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          APPLE_DEVELOPMENT_TEAM: ${{ steps.ios-signing.outputs.team_id }}
          APPLE_SIGNING_IDENTITY: ${{ steps.ios-certificate.outputs.identity }}
        run: |
          set -euo pipefail

          npx tauri ios build \
            --ci \
            --target aarch64 \
            --export-method "${{ steps.ios-signing.outputs.export_method }}"

      - name: Package signed iOS outputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/ios-signed

          IOS_OUTPUT_ROOT='src-tauri/gen/apple/build'

          IPA_PATH=$(find "$IOS_OUTPUT_ROOT" src-tauri/target -type f -name '*.ipa' 2>/dev/null | head -n 1)
          APP_PATH=$(find "$IOS_OUTPUT_ROOT" src-tauri/target -type d -name '*.app' 2>/dev/null | head -n 1 || true)
          DSYM_PATH=$(find "$IOS_OUTPUT_ROOT" src-tauri/target -type d -name '*.app.dSYM' 2>/dev/null | head -n 1 || true)
          ARCHIVE_PATH=$(find "$IOS_OUTPUT_ROOT" src-tauri/target -type d -name '*.xcarchive' 2>/dev/null | head -n 1 || true)

          if [ -z "$IPA_PATH" ]; then
            echo 'No IPA was produced by tauri ios build.' >&2
            echo 'Contents of src-tauri/gen/apple/build:'
            find "$IOS_OUTPUT_ROOT" -maxdepth 6 \( -type d -o -type f \) | sort || true
            find src-tauri/target -maxdepth 6 \( -type d -o -type f \) | sort || true
            exit 1
          fi

          cp "$IPA_PATH" artifacts/ios-signed/

          if [ -n "$APP_PATH" ] && [ -d "$APP_PATH" ]; then
            ditto -c -k --keepParent "$APP_PATH" artifacts/ios-signed/nostria-ios-app-signed-run-${{ github.run_id }}-${{ github.run_attempt }}.zip
          fi

          if [ -n "$DSYM_PATH" ] && [ -d "$DSYM_PATH" ]; then
            ditto -c -k --keepParent "$DSYM_PATH" artifacts/ios-signed/nostria-ios-dsym-signed-run-${{ github.run_id }}-${{ github.run_attempt }}.zip
          fi

          if [ -n "$ARCHIVE_PATH" ] && [ -d "$ARCHIVE_PATH" ]; then
            ditto -c -k --keepParent "$ARCHIVE_PATH" artifacts/ios-signed/nostria-ios-archive-run-${{ github.run_id }}-${{ github.run_attempt }}.zip
          fi

      - name: Upload signed iOS artifacts
        uses: actions/upload-artifact@v6
        with:
          name: nostria-ios-signed-run-${{ github.run_id }}-${{ github.run_attempt }}
          path: artifacts/ios-signed/**
          if-no-files-found: error

  publish-draft-release:
    name: Publish draft release assets
    runs-on: ubuntu-22.04
    needs:
      - prepare-release
      - build-desktop
      - build-android-verification
      - build-android-signed-release
      - build-ios-verification
      - build-ios-signed-release
    if: >-
      always() &&
      needs.prepare-release.result == 'success' &&
      needs.build-desktop.result == 'success' &&
      needs.build-android-verification.result == 'success' &&
      needs.build-ios-verification.result == 'success' &&
      needs.build-android-signed-release.result == 'success' &&
      needs.build-ios-signed-release.result == 'success'

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: nostria-*
          path: release-assets

      - name: List release assets
        shell: bash
        run: |
          set -euo pipefail
          find release-assets -type f | sort

      - name: Prepare release upload assets
        shell: bash
        run: |
          set -euo pipefail

          rm -rf release-upload
          mkdir -p release-upload
          updater_entries_file=$(mktemp)

          copy_release_asset() {
            local source_file="$1"
            local target_name="$2"

            cp "$source_file" "release-upload/$target_name"
          }

          append_updater_entry() {
            local platform="$1"
            local kind="$2"
            local file_name="$3"

            printf '%s|%s|%s\n' "$platform" "$kind" "$file_name" >> "$updater_entries_file"
          }

          while IFS= read -r source_file; do
            relative_path="${source_file#release-assets/}"
            artifact_name="${relative_path%%/*}"
            nested_path="${relative_path#*/}"
            target_name=$(basename "$nested_path")

            case "$artifact_name" in
              nostria-linux-installers-run-*|nostria-macos-installers-run-*|nostria-windows-installers-run-*|nostria-windows-arm-installers-run-*)
                case "$artifact_name:$target_name" in
                  nostria-linux-installers-run-*:*.AppImage|nostria-linux-installers-run-*:*.AppImage.sig|nostria-linux-installers-run-*:*.deb)
                    ;;
                  nostria-macos-installers-run-*:*.dmg|nostria-macos-installers-run-*:*.app.tar.gz|nostria-macos-installers-run-*:*.app.tar.gz.sig)
                    ;;
                  nostria-windows-installers-run-*:*.msi|nostria-windows-installers-run-*:*.exe|nostria-windows-installers-run-*:*.exe.sig)
                    ;;
                  nostria-windows-arm-installers-run-*:*.msi|nostria-windows-arm-installers-run-*:*.exe|nostria-windows-arm-installers-run-*:*.exe.sig)
                    ;;
                  *)
                    continue
                    ;;
                esac
                ;;
              nostria-android-release-apk-run-*)
                ;;
              nostria-ios-signed-run-*)
                if [[ "$nested_path" != "Nostria.ipa" ]]; then
                  continue
                fi
                ;;
              *)
                continue
                ;;
            esac

            case "$artifact_name" in
              nostria-android-release-apk-run-*)
                target_name="Nostria_${{ needs.prepare-release.outputs.version }}.apk"
                ;;
              nostria-ios-signed-run-*)
                target_name="Nostria_${{ needs.prepare-release.outputs.version }}.ipa"
                ;;
            esac

            copy_release_asset "$source_file" "$target_name"

            case "$artifact_name:$target_name" in
              nostria-linux-installers-run-*:*.AppImage)
                append_updater_entry 'linux-x86_64' file "$target_name"
                ;;
              nostria-linux-installers-run-*:*.AppImage.sig)
                append_updater_entry 'linux-x86_64' signature "$target_name"
                ;;
              nostria-windows-installers-run-*:*.exe)
                append_updater_entry 'windows-x86_64' file "$target_name"
                ;;
              nostria-windows-installers-run-*:*.exe.sig)
                append_updater_entry 'windows-x86_64' signature "$target_name"
                ;;
              nostria-windows-arm-installers-run-*:*.exe)
                append_updater_entry 'windows-aarch64' file "$target_name"
                ;;
              nostria-windows-arm-installers-run-*:*.exe.sig)
                append_updater_entry 'windows-aarch64' signature "$target_name"
                ;;
              nostria-macos-installers-run-*:*.app.tar.gz)
                append_updater_entry 'darwin-aarch64' file "$target_name"
                append_updater_entry 'darwin-x86_64' file "$target_name"
                ;;
              nostria-macos-installers-run-*:*.app.tar.gz.sig)
                append_updater_entry 'darwin-aarch64' signature "$target_name"
                append_updater_entry 'darwin-x86_64' signature "$target_name"
                ;;
            esac
          done < <(find release-assets -type f | sort)

          VERSION='${{ needs.prepare-release.outputs.version }}' \
          RELEASE_TAG='${{ needs.prepare-release.outputs.release_tag }}' \
          UPDATER_ENTRIES_FILE="$updater_entries_file" \
          python3 - <<'PY'
          import json
          import os
          from collections import defaultdict
          from datetime import datetime, timezone
          from pathlib import Path

          version = os.environ['VERSION']
          release_tag = os.environ['RELEASE_TAG']
          base_url = f"https://github.com/${{ github.repository }}/releases/download/{release_tag}"
          entries_path = Path(os.environ['UPDATER_ENTRIES_FILE'])
          upload_dir = Path('release-upload')

          platforms = defaultdict(dict)

          if entries_path.exists():
              for raw_line in entries_path.read_text(encoding='utf-8').splitlines():
                  if not raw_line:
                      continue
                  platform, kind, file_name = raw_line.split('|', 2)
                  if kind == 'file':
                      platforms[platform]['url'] = f"{base_url}/{file_name}"
                  else:
                      signature_path = upload_dir / file_name
                      platforms[platform]['signature'] = signature_path.read_text(encoding='utf-8').strip()

          required_platforms = [
              'linux-x86_64',
              'windows-x86_64',
              'windows-aarch64',
              'darwin-aarch64',
              'darwin-x86_64',
          ]

          missing = [platform for platform in required_platforms if set(platforms[platform]) != {'url', 'signature'}]
          if missing:
              raise SystemExit(f"Missing updater assets for platforms: {', '.join(missing)}")

          manifest = {
              'version': version,
              'pub_date': datetime.now(timezone.utc).replace(microsecond=0).isoformat().replace('+00:00', 'Z'),
              'platforms': {platform: platforms[platform] for platform in required_platforms},
          }

          (upload_dir / 'latest.json').write_text(json.dumps(manifest, indent=2) + '\n', encoding='utf-8')
          PY

          if ! find release-upload -maxdepth 1 -type f | grep -q .; then
            echo "No end-user release assets were prepared." >&2
            exit 1
          fi

          echo "Prepared release upload assets:"
          find release-upload -maxdepth 1 -type f | sort

      - name: Publish draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.prepare-release.outputs.release_tag }}
          RELEASE_NAME: ${{ needs.prepare-release.outputs.release_name }}
          RELEASE_PRERELEASE: ${{ needs.prepare-release.outputs.release_prerelease }}
          RELEASE_VERSION: ${{ needs.prepare-release.outputs.version }}
          TARGET_COMMITISH: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          release_body=$(cat <<EOF
          Draft build assets for Nostria v${RELEASE_VERSION}.

          This draft is updated by the unified build workflow on each run so the generated artifacts can be reviewed and published when ready.
          EOF
          )

          if gh release view "$RELEASE_TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            release_id=$(gh release view "$RELEASE_TAG" --repo "$GH_REPO" --json databaseId --jq '.databaseId')

            gh api \
              --method PATCH \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              -f tag_name="$RELEASE_TAG" \
              -f target_commitish="$TARGET_COMMITISH" \
              -f name="$RELEASE_NAME" \
              -F draft=true \
              -F prerelease="$RELEASE_PRERELEASE" \
              -f body="$release_body" >/dev/null
          else
            gh api \
              --method POST \
              -H 'Accept: application/vnd.github+json' \
              "/repos/${GITHUB_REPOSITORY}/releases" \
              -f tag_name="$RELEASE_TAG" \
              -f target_commitish="$TARGET_COMMITISH" \
              -f name="$RELEASE_NAME" \
              -F draft=true \
              -F prerelease="$RELEASE_PRERELEASE" \
              -f body="$release_body" >/dev/null
          fi

          gh release upload "$RELEASE_TAG" release-upload/* --repo "$GH_REPO" --clobber
